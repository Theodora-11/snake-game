<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Titillium+Web:ital,wght@0,200;0,300;0,400;0,600;0,700;0,900;1,200;1,300;1,400;1,600;1,700&display=swap" rel="stylesheet">
    <script src="script1.js" defer></script>
    <title>SNAKE GAME</title>
  </head>
  <body>
    <div class="score-game">
      <div>Score: <span class="score">000</span></div>
      <div>High score: <span class="high-score">000</span></div>
    </div>

    <div class="game-board">
      <img src="snake.png" alt="logo-picture" class="logo" />
      <h1 class="text">Press <b>spacebar</b> to start the game</h1>
    </div>

    <audio class="eat-sound" src="eat-sound.wav"></audio>
    <audio class="game-over-sound" src="game-over.mp3"></audio>
  </body>
</html>
